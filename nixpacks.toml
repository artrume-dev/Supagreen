[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --prefix /usr/local pnpm@10.32.1",
  "export PATH=\"/usr/local/bin:$PATH\"",
  "npx pnpm install --frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = ["npx pnpm --filter @workspace/api-server build"]

[start]
cmd = "npx pnpm --filter @workspace/api-server start"