packages:
  "framer-motion": "For page transitions, list animations, and onboarding flow transitions"
  "recharts": "For the weekly macros bar chart in the profile screen"
  "date-fns": "For formatting dates in the home feed and shopping list"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conditional tailwind class merging"

images:
  - path: "artifacts/web-app/public/images/hero-bg.png"
    description: "Abstract 3D gradient mesh background in very dark deep forest green and vibrant neon green with soft blurred light leaks, high-end tech aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/web-app/public/images/landing-illustration.png"
    description: "3D stylized floating healthy food ingredients like avocado, salmon, and leafy greens inside glowing glassmorphism spheres, dark background"
    aspect_ratio: "1:1"
  - path: "artifacts/web-app/public/images/pattern.png"
    description: "Subtle dark geometric grid pattern on black background for card textures"
    aspect_ratio: "1:1"

notes:
  - "Using wouter for routing. Base URL is handled in App.tsx via Router base prop."
  - "React Query hooks are imported from @workspace/api-client-react"
  - "Authentication is done via server-side browser redirect to /api/login and /api/auth/logout"
